name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          # prod will be added when the production environment is set up
      force_infra:
        description: 'Deploy infrastructure even without infra file changes'
        required: false
        default: false
        type: boolean
      force_api:
        description: 'Deploy API even without API file changes'
        required: false
        default: false
        type: boolean
      force_ui:
        description: 'Deploy UI even without UI file changes'
        required: false
        default: false
        type: boolean

# Required for OIDC token exchange with Azure and PR coverage comments
permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  DOTNET_VERSION: '10.x'
  NODE_VERSION: '22'

jobs:
  # ── Detect what changed ────────────────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
      api: ${{ steps.filter.outputs.api }}
      ui: ${{ steps.filter.outputs.ui }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2  # paths-filter needs at least 2 commits to diff
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            infra:
              - 'infrastructure/**'
            api:
              - 'StravaEditBotApi/**'
            ui:
              - 'strava-edit-bot-ui/**'

  # ── Run tests with coverage ───────────────────────────────────────────────────
  test:
    name: Run tests with coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Run tests with coverage
        run: |
          dotnet test \
            --collect "XPlat Code Coverage" \
            --settings coverlet.runsettings \
            --results-directory ./coverage
      - name: Coverage summary and threshold check
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage/**/coverage.cobertura.xml
          badge: true
          fail_below_min: true
          format: markdown
          hide_complexity: true
          indicators: true
          output: both
          thresholds: '80 90'
      - name: Diff coverage report
        if: github.event_name == 'pull_request'
        run: |
          git fetch --unshallow
          git fetch origin main
          pip install diff-cover --quiet
          diff-cover coverage/**/coverage.cobertura.xml \
            --compare-branch=origin/main \
            --format markdown:diff-coverage-results.md \
            --fail-under=80 || DIFF_RESULT=$?
          sed -i 's/staged and unstaged changes/new and changed lines/' diff-coverage-results.md
          sed -i '/^\|.*\|\s*100%\s*\|/d' diff-coverage-results.md
          sed -i '/^| ---/a _Files at 100% diff coverage are not shown._' diff-coverage-results.md
          if ! grep -q '^\| ' diff-coverage-results.md; then
            sed -i '/^| /d' diff-coverage-results.md
            sed -i '/^_Files at/d' diff-coverage-results.md
            echo '_All changed lines are covered._' >> diff-coverage-results.md
          fi
          cat diff-coverage-results.md > combined-coverage-results.md
          printf '\n---\n\n## Total Coverage\n\n' >> combined-coverage-results.md
          cat code-coverage-results.md >> combined-coverage-results.md
          exit ${DIFF_RESULT:-0}
      - name: Post coverage comment on PR
        uses: marocchino/sticky-pull-request-comment@v2
        if: always() && github.event_name == 'pull_request'
        with:
          recreate: true
          path: combined-coverage-results.md
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── Build and package the API ─────────────────────────────────────────────────
  build:
    name: Build API
    needs: [test, changes]
    if: |
      needs.changes.outputs.api == 'true' ||
      (github.event_name == 'workflow_dispatch' && inputs.force_api)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Publish
        run: |
          dotnet publish StravaEditBotApi/StravaEditBotApi.csproj \
            -c Release \
            -o ./publish
      - name: Create deployment package
        run: cd publish && zip -r ../app.zip .
      - uses: actions/upload-artifact@v7
        with:
          name: app
          path: app.zip
          retention-days: 1

  # ── Build the frontend ────────────────────────────────────────────────────────
  # VITE_API_BASE_URL is a GitHub Actions variable (not secret) — URLs are not
  # sensitive and get baked into the browser bundle anyway.
  # Set it in: Settings → Environments → <env> → Variables
  #
  # Vite mode is derived from the GitHub environment:
  #   dev  → --mode staging    (loads .env.staging)
  #   prod → --mode production (loads .env.production)
  build-ui:
    name: Build UI
    needs: changes
    if: |
      needs.changes.outputs.ui == 'true' ||
      (github.event_name == 'workflow_dispatch' && inputs.force_ui)
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: strava-edit-bot-ui/package-lock.json
      - name: Install dependencies
        working-directory: strava-edit-bot-ui
        run: npm ci
      - name: Resolve build script
        id: build_script
        run: |
          case "${{ inputs.environment || 'dev' }}" in
            prod) echo "script=build:production" >> $GITHUB_OUTPUT ;;
            *)    echo "script=build:staging"    >> $GITHUB_OUTPUT ;;
          esac
      - name: Build
        working-directory: strava-edit-bot-ui
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: npm run ${{ steps.build_script.outputs.script }}
      - uses: actions/upload-artifact@v7
        with:
          name: ui
          path: strava-edit-bot-ui/dist
          retention-days: 1

  # ── Deploy Bicep infrastructure ───────────────────────────────────────────────
  # Runs when infrastructure/** files change, or when manually triggered with
  # force_infra=true (useful after an out-of-band infra change or first setup).
  deploy-infra:
    name: Deploy infrastructure (${{ inputs.environment || 'dev' }})
    needs: changes
    if: |
      github.event_name != 'pull_request' &&
      (needs.changes.outputs.infra == 'true' ||
      (github.event_name == 'workflow_dispatch' && inputs.force_infra))
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v6
      - uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy Bicep
        run: |
          ENV="${{ inputs.environment || 'dev' }}"
          az deployment sub create \
            --location norwayeast \
            --template-file infrastructure/main.bicep \
            --parameters "infrastructure/environments/${ENV}.bicepparam" \
            --name "deploy-${ENV}-${{ github.run_id }}"

  # ── Deploy API ────────────────────────────────────────────────────────────────
  # Runs when API files change. Waits for infra if it ran; skips gracefully if not.
  # EF migrations run on app startup via MigrateAsync() using the managed identity.
  # App configuration secrets are pushed from GitHub environment secrets on every
  # deploy so rotating a secret takes effect without touching infrastructure.
  #
  # Required GitHub environment secrets (Settings → Environments → dev → Secrets):
  #   JWT_SECRET   — signing key (keep long and random, e.g. openssl rand -base64 64)
  #   JWT_ISSUER   — token issuer, e.g. https://strava-edit-bot-dev.azurewebsites.net
  #   JWT_AUDIENCE — token audience, e.g. https://strava-edit-bot-dev.azurewebsites.net
  deploy-app:
    name: Deploy API (${{ inputs.environment || 'dev' }})
    needs: [build, deploy-infra]
    if: |
      always() &&
      github.event_name != 'pull_request' &&
      needs.build.result == 'success' &&
      (needs.deploy-infra.result == 'success' || needs.deploy-infra.result == 'skipped')
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}
    steps:
      - uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: actions/download-artifact@v8
        with:
          name: app
          path: .
      - name: Deploy to App Service
        run: |
          ENV="${{ inputs.environment || 'dev' }}"
          APP_NAME="strava-edit-bot-${ENV}"
          az webapp deploy \
            --resource-group "${APP_NAME}-rg" \
            --name "${APP_NAME}" \
            --src-path app.zip \
            --type zip
      - name: Push app configuration secrets
        run: |
          ENV="${{ inputs.environment || 'dev' }}"
          APP_NAME="strava-edit-bot-${ENV}"
          az webapp config appsettings set \
            --resource-group "${APP_NAME}-rg" \
            --name "${APP_NAME}" \
            --settings \
              "Jwt__Secret=${{ secrets.JWT_SECRET }}" \
              "Jwt__Issuer=${{ secrets.JWT_ISSUER }}" \
              "Jwt__Audience=${{ secrets.JWT_AUDIENCE }}"

  # ── Deploy frontend ───────────────────────────────────────────────────────────
  # Uses the SWA deployment token (not OIDC) — Static Web Apps has its own auth
  # mechanism separate from the Azure RBAC used by the rest of the pipeline.
  #
  # Required GitHub environment secrets (Settings → Environments → dev → Secrets):
  #   AZURE_STATIC_WEB_APPS_API_TOKEN — from: az staticwebapp secrets list
  #       --name strava-edit-bot-dev-ui -g strava-edit-bot-dev-rg
  #       --query "properties.apiKey" -o tsv
  #
  # Required GitHub environment variables (Settings → Environments → dev → Variables):
  #   VITE_API_BASE_URL — e.g. https://strava-edit-bot-dev.azurewebsites.net
  deploy-ui:
    name: Deploy UI (${{ inputs.environment || 'dev' }})
    needs: [build-ui, deploy-infra]
    if: |
      always() &&
      github.event_name != 'pull_request' &&
      needs.build-ui.result == 'success' &&
      (needs.deploy-infra.result == 'success' || needs.deploy-infra.result == 'skipped')
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: ui
          path: ui-dist
      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: ui-dist
          skip_app_build: true
          output_location: ''
