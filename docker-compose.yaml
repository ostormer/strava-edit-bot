services:
  sqlserver:
    # docker exec -it strava-edit-bot-sqlserver /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Dev@Password1" -No
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: strava-edit-bot-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Dev@Password1"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

volumes:
  sqlserver_data:
